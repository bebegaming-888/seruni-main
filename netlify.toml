# =============================================================================
# Netlify Configuration — Seruni Mumbul
#
# Deployment target: Cloudflare Pages (frontend SPA)
# API: Railway (standalone, tidak melalui Netlify)
#
# Frontend di-host di Cloudflare Pages.
# netlify.toml ini adalah fallback / reference only.
# SPA routing: semua path diarahkan ke index.html untuk client-side routing.
#
# Catatan: Tidak ada redirect /api/* di sini.
# API proxy dilakukan di Cloudflare Pages dashboard (rewrite rules).
# =============================================================================

[build]
  command = "npm install && npm run build"
  publish = "dist/client"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefix=false"

# SPA Fallback — semua route yang tidak match file/static asset
# diarahkan ke index.html untuk client-side routing (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = [PathNot=/*.ico/, PathNot=/*.png/, PathNot=/*.jpg/, PathNot=/*.svg/, PathNot=/*.js/, PathNot=/*.css/, PathNot=/*.woff2/, PathNot=/*.json/]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"